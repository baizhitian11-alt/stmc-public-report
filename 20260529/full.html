<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200,initial-scale=1">
<title>素材周报 · 完整报告 · 20260529</title>
<style>
  :root{
    --bg:#0a0d14; --panel:#101622; --panel2:#0d1320; --line:#1f2937;
    --text:#e6edf3; --muted:#94a3b8; --primary:#fbbf24; --success:#86efac; --info:#9dbcff;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:0;background:var(--bg);color:var(--text);font:14px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
  a{color:var(--info);text-decoration:none}
  a:hover{text-decoration:underline}
  .header{padding:20px 28px;background:linear-gradient(180deg,#0d1320,#0a0d14);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .header h1{margin:0;font-size:22px;font-weight:700}
  .header .sub{color:var(--muted);font-size:13px}
  .header .badge{background:rgba(251,191,36,.14);color:var(--primary);padding:4px 10px;border-radius:12px;font-size:12px;border:1px solid rgba(251,191,36,.3)}

  .topbar{padding:14px 28px;background:var(--panel2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:13px}
  .topbar .group{display:flex;align-items:center;gap:8px}
  .topbar .label{color:var(--muted);font-size:12px}
  .chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;background:#172033;border:1px solid var(--line);color:#cbd2e0;font-size:12px;cursor:pointer;user-select:none;transition:.15s}
  .chip:hover{background:#1e293b}
  .chip.on{background:rgba(251,191,36,.14);border-color:rgba(251,191,36,.4);color:var(--primary)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;max-width:480px}
  select{background:#172033;color:var(--text);border:1px solid var(--line);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}
  .ms-dd{position:relative;display:inline-block}
  .ms-dd-btn{background:#172033;color:var(--text);border:1px solid var(--line);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;min-width:120px;text-align:left}
  .ms-dd-panel{position:absolute;top:100%;left:0;margin-top:4px;background:#0d1320;border:1px solid var(--line);border-radius:6px;padding:8px;display:none;z-index:50;min-width:220px;max-width:360px;max-height:320px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5);flex-direction:column}
  .ms-dd.open .ms-dd-panel{display:flex}
  .ms-dd-panel .ms-search{flex:0 0 auto;background:#0a0e18;color:var(--text);border:1px solid #1f2937;border-radius:5px;padding:5px 8px;font-size:12px;margin-bottom:6px;outline:none;font-family:inherit}
  .ms-dd-panel .ms-search:focus{border-color:var(--info)}
  .ms-dd-panel .ms-search::placeholder{color:#475569}
  .ms-dd-panel .ms-empty{flex:0 0 auto;padding:12px 4px;text-align:center;color:#475569;font-size:11px}
  .ms-dd-panel .ms-chips{flex:1 1 auto;overflow:auto;display:block}

  .btn-clear{background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px}
  .btn-clear:hover{background:#172033;color:var(--text)}

  /* —— 特征提炼 —— */
  .common{margin:18px 28px 0;padding:20px;background:linear-gradient(180deg,#101622,#0d1320);border:1px solid var(--line);border-radius:10px}
  .common-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .common-head .ico{font-size:20px}
  .common-title{font-size:16px;font-weight:700}
  .common-sub{color:var(--muted);font-size:12px}
  .common-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
  @media (min-width:1280px){ .common-grid{grid-template-columns:repeat(5,1fr)} }
  .cf-card{background:#0a0e18;border:1px solid var(--line);border-radius:8px;padding:16px;position:relative;display:flex;flex-direction:column;gap:8px;min-height:200px}
  .cf-card.active{border-color:rgba(157,188,255,.4);box-shadow:0 4px 12px rgba(157,188,255,.08)}
  .cf-no{position:absolute;top:10px;right:12px;color:var(--muted);font-size:11px;font-weight:700}
  .cf-title{color:var(--primary);font-size:14px;font-weight:700;line-height:1.4;padding-right:30px}
  .cf-desc{color:#cbd2e0;font-size:12.5px;line-height:1.7;flex:1}
  /* 5 维卡内"被引用素材"的小封面行 */
  .cf-evid{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;padding-top:8px;border-top:1px dashed #1f2937}
  .cf-evid-lab{font-size:11px;color:var(--muted);align-self:center;margin-right:2px}
  .cf-thumb{position:relative;width:42px;height:74px;border-radius:4px;overflow:hidden;border:1px solid var(--line);background:#000;cursor:pointer;flex:0 0 auto;transition:transform .15s, border-color .15s}
  .cf-thumb:hover{transform:translateY(-2px);border-color:var(--info);box-shadow:0 4px 8px rgba(157,188,255,.2)}
  .cf-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .cf-thumb .cf-thumb-no{position:absolute;left:2px;bottom:2px;color:#fff;font-size:10px;font-weight:700;background:rgba(0,0,0,.65);padding:1px 5px;border-radius:3px;line-height:1.2}
  .cf-thumb.no-img{display:flex;align-items:center;justify-content:center;color:#475569;font-size:10px;background:#101622}
  .cf-thumb-more{display:inline-flex;align-items:center;justify-content:center;width:42px;height:74px;border-radius:4px;border:1px dashed #2b3447;color:var(--muted);font-size:11px;background:#0a0e18}

  /* —— 卡片：纵向文档流，每条一张长卡 —— */
  .grid{padding:18px 28px;display:flex;flex-direction:column;gap:18px;max-width:1180px;margin:0 auto}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}

  /* 卡片头：序号 + 元信息 */
  .card-head{padding:14px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(180deg,#101622,#0d1320);border-bottom:1px solid var(--line)}
  .card-head .rank{background:rgba(251,191,36,.14);color:var(--primary);padding:4px 12px;border-radius:8px;font-weight:700;font-size:14px;border:1px solid rgba(251,191,36,.3);min-width:40px;text-align:center}
  .card-head .meta-item{font-size:12px;color:#cbd2e0;background:#172033;border:1px solid var(--line);padding:3px 10px;border-radius:4px}
  .card-head .meta-item.muted{color:var(--muted)}
  .card-head .meta-item.md5-tag{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#9dbcff;background:rgba(157,188,255,.10);border-color:rgba(157,188,255,.32);cursor:pointer;user-select:all}
  .card-head .meta-item.md5-tag:hover{background:rgba(157,188,255,.18);color:#bfd2ff}
  .card-head .meta-item.md5-tag.copied{color:#86efac;border-color:rgba(134,239,172,.55);background:rgba(134,239,172,.14)}
  .card-head .tag{background:rgba(251,191,36,.2);color:var(--primary);padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid rgba(251,191,36,.4)}

  /* 卡片身体：左封面 + 右文本，2 栏 */
  .card-body{display:grid;grid-template-columns:240px 1fr;gap:20px;padding:18px}
  .card-cover{aspect-ratio:9/16;max-height:420px;background:#000;border-radius:8px;overflow:hidden;border:1px solid var(--line);cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .card-cover:hover{border-color:var(--info);box-shadow:0 6px 18px rgba(157,188,255,.18)}
  .card-cover img{width:100%;height:100%;object-fit:cover;display:block}
  .card-cover .no-cover{display:flex;align-items:center;justify-content:center;height:100%;color:#475569;font-size:13px}
  .card-content{display:flex;flex-direction:column;gap:14px;min-width:0}
  /* 跳转高亮：v2 维度卡点小封面后，目标主卡闪一下 */
  .card.flash{animation:cardFlash 1.2s ease-out 1}
  @keyframes cardFlash{
    0%   {box-shadow:0 0 0 0 rgba(251,191,36,0)}
    20%  {box-shadow:0 0 0 4px rgba(251,191,36,.6),0 0 28px 6px rgba(251,191,36,.45)}
    100% {box-shadow:0 0 0 0 rgba(251,191,36,0)}
  }
  .card{scroll-margin-top:84px}

  /* 指标条带（对外版只 4 项，无金额） */
  .metrics-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;background:#0a0e18;border:1px solid var(--line);border-radius:8px;padding:10px}
  .metric{text-align:center}
  .metric .lab{font-size:11px;color:var(--muted);margin-bottom:3px}
  .metric .val{font-size:15px;font-weight:700;color:var(--text)}

  /* 解析正文段落式 */
  .ana-block{padding:10px 12px;background:#0a0e18;border-left:3px solid var(--info);border-radius:0 6px 6px 0}
  .ana-block.warn{border-left-color:var(--primary)}
  .ana-block.ok{border-left-color:var(--success)}
  .ana-block .ana-h{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .ana-block .ana-t{font-size:13px;color:#cbd2e0;line-height:1.75;white-space:pre-wrap;word-break:break-word}
  .ana-block .ana-t.empty{color:#64748b;font-style:italic;font-size:12px}
  /* 折叠字段（如完整脚本）：用原生 <details> + 自定义视觉 */
  .ana-block.ana-collapsible{border-left-color:#94a3b8;background:#0c1320}
  .ana-block.ana-collapsible details summary{outline:none;list-style:none}
  .ana-block.ana-collapsible details summary::-webkit-details-marker{display:none}
  .ana-block.ana-collapsible details[open] summary .ana-collapsible-hint::before{content:"▴ 点击收起"}
  .ana-block.ana-collapsible details[open] summary .ana-collapsible-hint{font-size:0;line-height:0}
  .ana-block.ana-collapsible details[open] summary .ana-collapsible-hint::before{font-size:11px;line-height:1.6;color:#64748b;font-weight:400}
  .ana-block.ana-collapsible .ana-collapsible-hint{font-size:11px;color:#64748b;font-weight:400;margin-left:auto}
  .ana-block.ana-collapsible:hover{background:#0e1626}
  .ana-block.ana-collapsible .ana-collapsible-body{margin-top:8px;padding:10px 12px;background:#070b14;border-radius:4px;max-height:380px;overflow-y:auto;font-family:Menlo,Monaco,Consolas,monospace;font-size:12px;line-height:1.7}
  /* 黄金 3s Prompt 复制 / 妙思跳转按钮 */
  .hook-prompt-actions{display:inline-flex;align-items:center;gap:6px;margin-left:auto}
  .hp-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;font-size:11px;color:#cbd2e0;background:#172033;border:1px solid var(--line);border-radius:6px;cursor:pointer;text-decoration:none;transition:.15s;font-family:inherit}
  .hp-btn:hover{background:#1e293b;color:#fff;border-color:var(--info)}
  .hp-btn.copied{background:rgba(134,239,172,.15);color:#86efac;border-color:rgba(134,239,172,.4)}
  /* toast */
  #_pubToast{position:fixed;left:50%;top:24px;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:13px;color:#fff;z-index:1000;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  #_pubToast.ok{background:#15803d}
  #_pubToast.err{background:#b91c1c}

  /* 回顶按钮：滚动一定距离后淡入，点击平滑回到顶 */
  #backToTop{
    position:fixed;right:28px;bottom:32px;width:46px;height:46px;border-radius:50%;
    background:linear-gradient(180deg,#172033,#0d1320);color:var(--info);
    border:1px solid #2b3447;cursor:pointer;font-size:18px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 18px rgba(0,0,0,.5);
    opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .25s,transform .25s,background .15s,color .15s;z-index:999
  }
  #backToTop.show{opacity:1;pointer-events:auto;transform:translateY(0)}
  #backToTop:hover{background:#1e293b;color:#fff;border-color:var(--info)}

  .video-link{font-size:12px;color:var(--info);word-break:break-all;display:inline-block;padding:6px 12px;background:rgba(157,188,255,.08);border:1px solid rgba(157,188,255,.2);border-radius:6px}
  .video-link:hover{background:rgba(157,188,255,.16);text-decoration:none}

  /* 素材结构关键帧条带 —— 横向滚动，全宽 */
  .struct{padding:14px 18px 18px;border-top:1px solid var(--line);background:#0a0e18}
  .struct-h{font-size:13px;font-weight:600;color:var(--success);margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .struct-h .cnt{color:var(--muted);font-weight:400;font-size:11px}
  .frames{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:#334155 transparent}
  .frames::-webkit-scrollbar{height:6px}
  .frames::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  .frame{flex:0 0 150px;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .frame img{width:100%;aspect-ratio:9/16;object-fit:cover;display:block;background:#000}
  .frame .fc{padding:6px 8px;text-align:center}
  .frame .fn{font-size:11px;font-weight:600;color:#cbd2e0;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .frame .ft{font-size:10px;color:var(--muted);margin-top:2px}
  .frame.no-img{padding:8px}
  .frame.no-img .ph{aspect-ratio:9/16;display:flex;align-items:center;justify-content:center;background:#0a0e18;border:1px dashed var(--line);border-radius:4px;color:#475569;font-size:11px}

  /* 移动端兼容 */
  @media (max-width: 720px){
    .card-body{grid-template-columns:1fr;padding:14px}
    .card-cover{max-height:360px;max-width:240px;margin:0 auto}
    .grid{padding:12px}
    .header,.topbar,.struct{padding-left:14px;padding-right:14px}
  }

  .empty{padding:48px;text-align:center;color:var(--muted)}
  .footer{padding:20px;text-align:center;color:var(--muted);font-size:11px;border-top:1px solid var(--line);margin-top:20px}
</style>
</head>
<body>

<div class="header">
  <h1>素材周报 · 完整报告 · 20260529</h1>
  <span class="badge" id="countBadge">0 条</span>
  <span class="sub" id="metaSub"></span>
  <span id="publishToWebSlot" style="margin-left:auto"></span>
</div>

<div class="topbar">
  <div class="group">
    <span class="label">📊 指标标签</span>
    <div class="chips" id="fMetricTags"></div>
  </div>
  <div class="group">
    <span class="label">🩺 解析状态</span>
    <span class="chip" id="chipOnlyFailed" title="仅显示尚未解析或解析不完整的素材">⚠ 仅显示失败</span>
  </div>
  <div class="group">
    <span class="label">🏷️ 行业</span>
    <div class="ms-dd" id="ddIndustry"><button class="ms-dd-btn">行业（全部）</button><div class="ms-dd-panel"></div></div>
  </div>
  <div class="group">
    <span class="label">🧴 商品类型</span>
    <div class="ms-dd" id="ddProduct"><button class="ms-dd-btn">商品类型（全部）</button><div class="ms-dd-panel"></div></div>
  </div>
  <div class="group">
    <span class="label">👥 客户</span>
    <div class="ms-dd" id="ddCustomer"><button class="ms-dd-btn">客户（全部）</button><div class="ms-dd-panel"></div></div>
  </div>
  <div class="group">
    <span class="label">🏪 品牌</span>
    <div class="ms-dd" id="ddBrand"><button class="ms-dd-btn">品牌（全部）</button><div class="ms-dd-panel"></div></div>
  </div>
  <div class="group">
    <span class="label" title="AI 解析时基于前 10 秒判定的开篇类型一级标签">🎬 开篇类型</span>
    <div class="ms-dd" id="ddMatType"><button class="ms-dd-btn">开篇类型（全部）</button><div class="ms-dd-panel"></div></div>
  </div>
  <div class="group">
    <span class="label" title="二级风格名（4-12 字自由文本），与一级开篇类型联动：选了一级时这里只显示该一级下出现过的二级">🏷️ 二级风格</span>
    <div class="ms-dd" id="ddMatSub"><button class="ms-dd-btn">二级风格（全部）</button><div class="ms-dd-panel"></div></div>
  </div>
  <div class="group">
    <span class="label" title="csv 中『白达or非白达』字段（取数 skill 自动判定）">🏛 白达or非白达</span>
    <div class="ms-dd" id="ddBaida"><button class="ms-dd-btn">白达or非白达（全部）</button><div class="ms-dd-panel"></div></div>
  </div>
  <div class="group">
    <span class="label" title="csv 中『拓品品类分类』字段（头部类目 / 机会类目 / 其他），对外称『爆品分类』">📦 爆品分类</span>
    <div class="ms-dd" id="ddTuopin"><button class="ms-dd-btn">爆品分类（全部）</button><div class="ms-dd-panel"></div></div>
  </div>
  <div class="group">
    <span class="label" title="csv 中『拓品品类名称』字段（具体品类名，例如：精华 / 面部底妆 / 贴片面膜），对外称『爆品名称』">🛒 爆品名称</span>
    <div class="ms-dd" id="ddTuopinName"><button class="ms-dd-btn">爆品名称（全部）</button><div class="ms-dd-panel"></div></div>
  </div>
  <div class="group">
    <span class="label">排序</span>
    <select id="sortBy">
      <option value="增长量">按 高增长</option>
      <option value="消耗">按 高消耗</option>
      <option value="ctr" selected>按 ctr</option>
      <option value="cvr">按 cvr</option>
      <option value="完播3s">按 3s完播</option>
      <option value="播放时长">按 播放时长</option>
    </select>
    <select id="sortDir">
      <option value="desc" selected>降序</option>
      <option value="asc">升序</option>
    </select>
  </div>
  <div class="group">
    <span class="label">显示</span>
    <select id="topN">
      <option value="5">Top 5</option>
      <option value="10">Top 10</option>
      <option value="15">Top 15</option>
      <option value="20" selected>Top 20</option>
      <option value="0">全部</option>
    </select>
  </div>
  <button class="btn-clear" id="btnClearFilters">🧹 清空筛选</button>
</div>

<section class="common" id="commonSection" hidden>
  <div class="common-head">
    <span class="ico">🔥</span>
    <span class="common-title" id="commonTitle">特征提炼</span>
    <span class="common-sub" id="commonSub"></span>
  </div>
  <div class="common-grid" id="commonGrid"></div>
  <div class="common-empty" id="commonEmpty" hidden
       style="padding:14px 16px;color:var(--muted);font-size:12px;background:#0a0e18;border:1px dashed #2b3447;border-radius:8px;line-height:1.7">
    多维度交叉筛选下不展示预跑特征提炼。<br>
    <span style="color:#64748b">单独勾选「开篇类型」或「商品类型」中的一个值时会显示该切片的预跑结果；清空筛选条件可看全量提炼。</span>
  </div>
</section>

<div id="grid" class="grid"></div>
<div class="footer" id="footer"></div>
<button id="backToTop" type="button" title="回到顶部" aria-label="回到顶部">↑</button>

你』\n22-27s：于震：『我必须说句掏心窝子的话，我于震这辈子没给任何产品站过台，唯独这次破例』\n27-33s：于震：『这两盒你用完，我敢让你拿着放大镜给我使劲的找，你能够找到一条纹都算我厉害』\n33-43s：于震：『如果说您的眼袋大、川字纹、法令纹深的，您听好了，我于震是这款白云山抗皱眼油的推荐官』\n43-45s：于震：『我敢拍着胸脯向大家保证』\n45-60s：王琳：『我推荐产品是有严格标准的。如果说你长了很多的皱纹和大眼袋，你把它换成这个就行了。它不用调不用配，洗完脸直接用。口红可以不买，但是这个瞒着老公也要买』\n60-66s：李若彤：『我一直很担心，如果这眼油停产我就惨了。十几二十年我没找到一个能代替这个眼油的产品』\n66-73s：男声：『我就不理解了，你们宁可用大几百的眼霜，为什么也不愿意试试我们国产的眼油呢』\n73-82s：王琳：『如果你是眼角细纹干纹多的，那你就两天涂一次。如果你是上眼皮松弛下垂的，那你就一天抹一次』\n82-89s：李若彤：『我今年58岁了，眼睛依旧保持紧致清澈的秘密就是用了它，就是这个白云山眼部精华油』\n89-108s：男声：『如果眼袋像气球，那就跟着白云山走。如果眼纹像蜘蛛网，更得跟着白云山走。就是这个丑丑的国货，做了50多年老品牌，没点实力怎么能做这么久。我们只是把钱花在成分和研发上，给国货一个机会吧』\n108-117s：李若彤：『是真不想打这个眼油的广告，毕竟现在在拍一发二的活动，这么优惠，买一次就能用很久，这次就纯当回馈粉丝了』\n117-125s：女声：『现在只要通过这条视频进入直播间的朋友们，买正装送正装。如果你有眼袋眼纹，赶紧试一下』", "素材结构": [{"name": "痛点引入", "time": "0-10s", "content": "于震以专家形象讲解木偶纹显老问题，引出产品"}, {"name": "产品亮相", "time": "10-20s", "content": "展示白云山抗皱眼油并演示涂抹方法"}, {"name": "明星背书", "time": "20-45s", "content": "于震郑重承诺+挑战式话术建立产品信任"}, {"name": "多明星种草", "time": "45-70s", "content": "王琳、李若彤等明星轮番推荐，强化背书"}, {"name": "品牌实力", "time": "70-108s", "content": "展示工厂生产线与50年国货品牌背景"}, {"name": "使用指导", "time": "108-122s", "content": "针对不同眼部问题给出具体使用频率建议"}, {"name": "限时促销", "time": "122-125s", "content": "拍一发二优惠活动+引导进入直播间下单"}], "核心卖点": ["明星同款推荐", "50年国货老品牌", "淡化木偶纹眼纹", "改善眼袋松弛", "晚间专用配方", "植萃精华成分", "拍一发二优惠", "洗完脸直接用"], "黄金3sPrompt": "开场画面为金色稻田乡村背景，画面中央大字显示『嘴角老太太纹』制造焦虑钩子，停留0.5秒后快切至穿白大褂戴眼镜的中年男士（专家形象）正面特写，男声用权威语气说『嘴角两边的纹叫木偶纹，一出现人就老了10岁』，语速中等偏快，字幕同步弹出关键词『老10岁』加粗飘红。节奏紧凑，前3秒用衰老焦虑+专家权威双重钩子锁定中老年女性停留。"}, "cover": "assets/4c72c0791fa4f67a.jpg"}, {"md5": "2bff0594154c159261ad3f4dfc231377", "video_url": "", "素材创建时间": "20260521", "时间": "未填", "KPI三级行业": "本土美妆", "商品类型": "精华液/肌底液", "客户简称": "", "品牌or非品牌": "品牌", "白达or非白达": "非白达", "拓品品类分类": "头部类目", "拓品品类名称": "精华", "metric_tags": ["高消耗", "高增长"], "metrics": {"消耗": 12.848319091, "ctr": 1.8808777429467085, "cvr": 13.026678932842689, "增长量": 12.848319091, "完播3s": 20.550773778473314, "播放时长": 3.9282414590797528}, "analysis": {"开篇类型": {"一级": "达人开篇", "二级": "人设口播x痛点引入"}, "跑量learning": "✅【模特】选用戴眼镜男性专家形象口播，建立专业公信力，搭配素人女模特演示增强真实感\n✅【痛点表达】精准击中『颧骨长斑』『脸颊两边片状点』等具体痛点，让用户产生『这说的就是我』的共鸣\n✅【场景】居家护肤场景+产品上手演示，去广告化呈现，强化日常使用代入感\n✅【效果呈现】采用次抛精华上脸涂抹演示+成分数据可视化（3%烟酰胺+3%氨甲环酸），让功效可感知", "脚本拆解": "开篇类型属于达人口播+痛点引入型。开篇由戴眼镜男性达人直接抛出『颧骨长斑记住氨甲环酸』的核心记忆点，配合女模特涂抹产品画面快速建立场景。接着用『脸颊两边片状点』精准描述目标人群痛点，并用手指圈出颧骨位置强化视觉锚点。重点展示次抛精华的产品形态，并口播『3%烟酰胺+3%氨甲环酸双重作用』的成分卖点。随后切换另一位女模特全脸涂抹演示使用方法，强调『每天洗完脸取一支当精华涂』的便捷性。结尾达人用『你试一下会回来感谢我』的承诺式话术引导行动。", "前3s内容解析": "0-1s：『颧骨长斑记住氨甲环酸』痛点开场\n1-2s：女模特面部涂抹精华特写\n2-3s：『脸颊两边片状点』强化痛点描述", "完整脚本": "0-2s：达人：『颧骨长了斑，要记住氨甲环酸』（左下角达人讲解，背景展示次抛精华产品）\n2-5s：达人：『就如果脸颊两边的片状点，咱们只记住一个护肤成分』（女模特涂抹精华画面）\n5-8s：达人：『那就是氨甲环酸。就这个位置长了成片点的』（女模特颧骨特写，标注斑点位置）\n8-11s：达人：『你都可以记好这个东西。这个一支一支的啊』（达人手持次抛精华展示）\n11-15s：达人：『它里面是3%的烟酰胺，还有3%的氨甲环酸，双重作用的』（产品特写+手臂涂抹演示）\n15-19s：达人：『每天洗完脸就取一支，把它当精华来涂脸，全脸都可以涂』（另一女模特全脸涂抹演示）\n19-22s：达人：『方法很简单，你试一下，你会回来感谢我的』（达人挥手示意结束）", "素材结构": [{"name": "痛点+悬念开场", "time": "0-2s", "content": "达人抛出『颧骨长斑记住氨甲环酸』核心记忆点"}, {"name": "痛点引入", "time": "2-5s", "content": "描述脸颊片状斑点痛点，女模特涂抹演示"}, {"name": "痛点可视化", "time": "5-8s", "content": "圈出颧骨位置标注斑点，强化视觉锚点"}, {"name": "产品亮相", "time": "8-11s", "content": "展示次抛精华产品形态，强调独立包装设计"}, {"name": "卖点轰炸", "time": "11-15s", "content": "口播3%烟酰胺+3%氨甲环酸双重成分卖点"}, {"name": "使用演示", "time": "15-19s", "content": "女模特全脸涂抹演示，强调每天一支的用法"}, {"name": "引导下单", "time": "19-22s", "content": "达人承诺式话术『你会回来感谢我』促转化"}], "核心卖点": ["颧骨淡斑专用", "3%氨甲环酸", "3%烟酰胺", "双重美白成分", "次抛独立包装", "每日一支便捷", "全脸可用"], "黄金3sPrompt": "中景镜头，戴眼镜男性达人面对镜头，左下角小窗口形式出现，背景是圆镜前一只手展示次抛精华产品。达人用专业但亲切的语气说『颧骨长了斑，要记住氨甲环酸』，同时画面右侧切入女性模特涂抹精华的侧脸特写。字幕同步弹出『颧骨长斑记住氨甲环酸』形成记忆锚点。节奏紧凑，前3秒用痛点+成分名双钩子制造专业感与好奇心。"}, "cover": "assets/1e8efd184b1a55ca.jpg"}, {"md5": "a60c36da6b4e7752cd1185a75333c4eb", "video_url": "", "素材创建时间": "20260514", "时间": "未填", "KPI三级行业": "本土美妆", "商品类型": "止汗露/剂/喷雾", "客户简称": "", "品牌or非品牌": "非品牌", "白达or非白达": "白达", "拓品品类分类": "其他", "拓品品类名称": "其他", "metric_tags": ["高增长"], "metrics": {"消耗": 11.603953297, "ctr": 1.264463439333267, "cvr": 14.791129922708869, "增长量": 11.603953297, "完播3s": 18.383468363834307, "播放时长": 4.438358732477068}, "analysis": {"开篇类型": {"一级": "明星背书", "二级": "明星口播x促销引流开篇"}, "跑量learning": "✅【模特】选用李立群等国民级演员增强信任背书，配合年轻达人实测拉近用户距离\n✅【痛点表达】精准击中『腋下异味』『出汗发黄』『黏腻闷汗』等夏季高频痛点\n✅【场景】采用专业诊室+明星居家+街头采访+达人实测多场景组合，去广告化增强真实感\n✅【效果呈现】通过腋下泡沫清洁演示+汗渍对比+达人亲测分享，让止汗净味效果可感知", "脚本拆解": "开篇类型属于明星背书+达人测评+促销轰炸型。开篇由专业人士引出腋下异味痛点，紧接着明星李立群出镜强力背书，用『贴着胳肢窝闻都没味』的夸张话术建立产品信心。重点展示周年庆一折促销和拍一发三的超值福利，通过多人重复『再不买就恢复99两支』营造紧迫感。加入街头采访和达人亲测环节，展示产品乳霜质地和北美金缕梅等成分卖点。结尾达人分享使用体验，强调挤公交地铁都不怕，引导下单转化。", "前3s内容解析": "0-1s：专业人士说『腋下有多臭用它就有多舒服』\n1-2s：女声惊叹『这是什么好舒服呀』\n2-3s：腋下涂抹泡沫清洁特写", "完整脚本": "0-1s：专业人士：『你腋下有多臭，用它就有多舒服』\n1-2s：女声：『哇，这是什么？好舒服呀！』\n2-4s：(腋下涂抹泡沫+纸巾擦拭特写)\n4-9s：李立群：『这三支你用完，我敢让你贴着胳肢窝给我使劲地闻』\n9-12s：李立群：『你要是还能闻到一点异味，我都给你退』\n12-18s：李立群：『我从来没有这么逼迫你下单，今天我逼迫你下单，只讲实在话』\n18-26s：李立群：『这次周年庆提前购来了，价格真的是一降再降，一年就这么一次，这次活动真的不要再错过了』\n26-28s：女声：『一折一折，全场一折了』\n28-32s：李立群：『有净味的干料啊，今天送的呀，比你买的还要多』\n32-35s：李立群：『你要是再不囤就真的没有了』\n35-41s：李立群：『那为了感恩所有的粉丝呢，这次啊，家人们你们想要什么，我就给你们送什么』\n41-50s：李立群：『尤其是腋下刺鼻难闻，腋窝汗多发黄的家人们，真的不要错过它了，知道吧』\n50-53s：路人甲：『周年庆再不买，就恢复99两支了』\n53-57s：路人乙：『周年庆再不买，就恢复99两支了』\n57-60s：路人丙：『周年庆再不买，就恢复99两支了』\n60-65s：旁白：『李立群发出最后通牒，原本99两支的止汗霜已经很划算了』\n65-71s：旁白：『现在李立群为了庆祝周年庆，直接宣布全场一折，再不买真的亏大了』\n71-74s：李立群：『再见了平台，再见了我所有的老粉丝』\n74-78s：李立群：『这个活动结束之后呢，我们就要涨价了』\n78-84s：李立群：『我们收到信息了，就所有的这个原材料的价格都要上涨』\n84-89s：李立群：『所以说之后就不能再做拍一发三的活动了』\n89-95s：李立群：『你看现在我也是硬着头皮做的，我说句心里话，真的是有点后悔的』\n95-98s：路人：『便宜又好用，我也是朋友推荐才买的，没想到是真的有用』\n98-103s：路人：『本来啊，我都打算用止汗露遮盖一辈子了，没想到遇到了它，真的太牛了』\n103-106s：达人：『我以前一到夏天，腋下出汗就特别明显』\n106-111s：达人：『也买过好多止汗膏、止汗粉的，但是敷上去就是那种特别黏腻，就闷得慌，捂在那的感觉』\n111-115s：达人：『但宫教授他们家这个氯化羟铝止汗霜，就像是在这织了一张透明的网一样』\n115-117s：达人：『而且散发出来的是那种很清凉的感觉』\n117-121s：达人：『它这个是乳霜的质地，就特别好吸收，很好推开，而且不会黏腻』\n121-124s：达人：『里面的北美金缕梅水，就是减少那个味的滋生』\n124-128s：达人：『烟酰胺、泛醇、草珊瑚，就是让这边更干爽舒适，它就是温和止汗』\n128-132s：达人：『现在天气越来越热了，你就早上涂个一次，就挤公交挤地铁都不带怕的』\n132-135s：达人：『自从有了它，我就再也没有怕跟别人近距离社交了』", "素材结构": [{"name": "痛点+悬念开场", "time": "0-4s", "content": "专业人士引出腋下异味痛点，产品使用演示"}, {"name": "明星背书", "time": "4-12s", "content": "李立群出镜强力推荐，承诺无效可退"}, {"name": "促销轰炸", "time": "12-35s", "content": "周年庆一折、拍一发三、送的比买的多"}, {"name": 丑丑的国货，做了50多年老品牌，没点实力怎么能做这么久』\n79-84s：旁白：『我们只是把钱花在成分和研发上，给国货一个机会』（展示灵芝人参基地）\n84-89s：于震：『再不买就错过周年庆半价了，如果你觉得天天用有点贵，就趁现在有活动赶紧买』\n89-97s：旁白：『于震发出最后通牒，这次不买就不送这么多了。本来说好的69一瓶眼油，现在于震为了回馈粉丝，直接宣布周年庆提前购』\n97-109s：旁白：『很多人都知道的好处，但是很多人呢不知道该怎么用，什么时候用才能发挥最大的价值。不要在早上用，晚上才是保养皮肤的黄金时间。遇上皮肤差、脸色暗沉、皮肤干燥没有弹性，你呢去买这个』\n109-124s：旁白：『每晚睡前取少量均匀的涂抹在脸上。老国货品牌，用在脸上的东西不仅要好用，而且要有效。咱们老百姓啊挣钱不容易，我们只买对的不买贵的，给国货一次机会』（产品展示收尾）", "素材结构": [{"name": "开篇悬念", "time": "0-3s", "content": "于震涂眼油产生夸张泡沫特效制造好奇"}, {"name": "痛点引入", "time": "3-14s", "content": "于震指出额头纹、法令纹、川字纹等衰老痛点"}, {"name": "产品亮相", "time": "14-24s", "content": "推荐白云山抗皱眼油并强调晚间使用"}, {"name": "用户证言", "time": "24-36s", "content": "街采素人分享使用效果+于震信誉担保"}, {"name": "品牌背书", "time": "36-60s", "content": "50年老国货+工厂生产线+天然成分展示"}, {"name": "明星背书", "time": "60-80s", "content": "于震+王琳+李若彤同款强化信任"}, {"name": "限时促销", "time": "80-100s", "content": "周年庆半价69元一瓶+买多送多"}, {"name": "引导下单", "time": "100-124s", "content": "使用教程+『给国货一个机会』情感收尾"}], "核心卖点": ["明星于震同款", "50年老国货", "周年庆半价", "淡纹抗皱", "天然植萃成分", "国妆特字认证", "工厂直发", "晚间专用"], "黄金3sPrompt": "中景镜头拍摄知名中年男演员为躺着的老人眼周涂抹精华油，画面停留0.5秒后眼周迅速产生大量白色泡沫特效，配音用惊讶语气喊出『看看看看，哦天哪！太夸张了！』，同步弹出夸张文字特效。屏幕角标显示『著名演员XXX同款』增加信任背书。整体节奏快速紧凑，用视觉奇观+明星效应双重钩子在3秒内抓住用户停留。"}, "cover": "assets/41dabdf422416a42.jpg"}, {"md5": "fb18a52c5b73d5af470d9189e223ce3a", "video_url": "", "素材创建时间": "20260512", "时间": "未填", "KPI三级行业": "本土美妆", "商品类型": "眼膜", "客户简称": "", "品牌or非品牌": "非品牌", "白达or非白达": "白达", "拓品品类分类": "其他", "拓品品类名称": "其他", "metric_tags": ["高ctcvr"], "metrics": {"消耗": 6.78971749, "ctr": 3.886721572027164, "cvr": 8.710177783080779, "增长量": -6.013688955, "完播3s": 43.75905516755704, "播放时长": 13.02721782210641}, "analysis": {"开篇类型": {"一级": "达人开篇", "二级": "男性主播x悬念口播开篇"}, "跑量learning": "✅【模特】选用男性主播口播，打破美妆女性代言惯例，以『阳阳』人设建立公信力与差异化记忆点\n✅【痛点表达】精准击中『眼袋』『眼纹』『法令纹』『松弛下垂』等中年女性核心抗衰焦虑\n✅【场景】舞台直播间+街头采访+产品使用演示，营造真实带货氛围与信任背书\n✅【效果呈现】采用『贴敷前后对比』+『多位素人证言』+『产品质地特写』让效果可感知", "脚本拆解": "开篇类型属于男性主播悬念口播+限时福利型。开篇主播以『我啥都敢卖，但这个眼袋贴不敢卖』制造价格悬念，快速抓住注意力。接着用价格阶梯递减（99→69→59都不用）层层递进，并抛出『先使用再付款』的承诺降低决策门槛。中段切换女主播强调原材料涨价、 5%的水精华。上嘴丝滑水润很舒服，干唇涂也不会卡纹起皮。』\n128-138s：达人8：『男生涂了也秒变纯欲小奶狗。它成膜后其实是哑光的，涂完就是这种很高级的感觉。关键吃饭喝水都不掉。』\n138-145s：达人8：『上班、约会、聚餐，出门涂一次就够了。现在直播间拍一到手4件，你还不赶紧冲！』\n145-150s：胖同事：『还得是你真贴心。』小陈：『我怎么不觉得呀！』\n150-158s：小陈：『不是，你怎么……我跟我男朋友都约好了，就因为你，去不了了。』陈姐：『谁邀请你们了？还你跟你男朋友约好了。』\n158-165s：小陈：『是，你没邀请我，你还师傅呢，都不如人家外人对我热情。』陈姐：『那你知道外人为什么对你热情吗？』小陈：『人家人好呗！』\n165-175s：陈姐：『那没有。我俩大学同学外加同事三年，关系铁到睡一张床，人是看我面子才加的你。这你要搞搞清楚，并不是你可爱优秀来事好吗？』\n175-185s：小陈：『哎不是……』陈姐：『行了，我再给你上最后一课，人要有边界感。没邀请你的聚会你别跟着瞎掺和，挤不进的圈子别硬挤。』\n185-192s：小陈：『我……』陈姐：『行了，闭上小嘴吧，别跟我说话，以后找别人带你去。』", "素材结构": [{"name": "剧情开篇", "time": "0-15s", "content": "职场露营邀约，小徒弟想蹭聚会制造社交冲突"}, {"name": "剧情铺垫", "time": "15-50s", "content": "小陈得寸进尺想带男友，陈姐果断取消露营"}, {"name": "产品植入", "time": "50-60s", "content": "陈姐送闺蜜珂拉琪水唇露，引出产品卖点"}, {"name": "达人种草", "time": "60-100s", "content": "多位达人展示清甜芭乐色，强调水润不卡纹"}, {"name": "效果实测", "time": "100-115s", "content": "男博主吃鸡翅喝饮料实测，证明持久不掉色"}, {"name": "卖点轰炸", "time": "115-150s", "content": "85%水精华、哑光成膜、多场景适用等卖点"}, {"name": "剧情收尾", "time": "150-192s", "content": "职场金句『人要有边界感』，强化记忆点"}], "核心卖点": ["85%水精华", "不沾杯不掉色", "干唇不卡纹", "30秒水转雾成膜", "清甜芭乐色", "拍一到手四支", "妈生好气色", "哑光高级妆效"], "黄金3sPrompt": "现代办公室场景，中景拍摄两位职场女性站在工位旁交谈。画面明亮通透，一位戴眼镜的干练女性被同事热情喊话。配音用轻快语气说『陈大媒婆！为感谢你撮合有功，周末露营烧烤去啊』，字幕同步显示对话内容。节奏轻松活泼，用日常职场社交场景和『媒婆』这个反差称呼制造好奇心，让观众想知道后续剧情发展。"}, "cover": "assets/02a25f493340d3c8.jpg"}, {"md5": "b11fdf02161096b54384fa9fa2133ba9", "video_url": "", "素材创建时间": "20260512", "时间": "未填", "KPI三级行业": "本土美妆", "商品类型": "安瓶/原液/次抛精华", "客户简称": "", "品牌or非品牌": "品牌", "白达or非白达": "非白达", "拓品品类分类": "头部类目", "拓品品类名称": "精华", "metric_tags": ["高3s完播"], "metrics": {"消耗": 1.457921766, "ctr": 1.176093232118037, "cvr": 7.894736842105263, "增长量": 1.457921766, "完播3s": 70.78800605893693, "播放时长": 8.583934196709835}, "analysis": {"开篇类型": {"一级": "达人开篇", "二级": "人设口播x逆袭悬念开篇"}, "跑量learning": "✅【模特】选用自称16年美容院从业者的中年女性博主，以'快40岁皮肤依然好'建立同龄信任感\n✅【痛点表达】精准击中'美容院太贵''每次做舍不得''护肤成本高'等消费痛点\n✅【场景】地铁生活场景+居家护肤实操，强调'自己在家就能做'的便捷性，去广告化\n✅【效果呈现】采用'43岁被误认为大学生'的逆袭人设+仪器喷雾即时透亮的视觉演示，让效果可感知", "脚本拆解": "开篇类型属于达人人设口播+逆袭悬念型。开篇   // 6 个指标：消耗 / 增长量 / CTR / CVR / 3s完播 / 播放时长
  // 对外版（默认）：消耗/增长量 不展示数值，但保留位置（显示『—』）以让客户看到指标维度的存在
  // 内部版：展示完整数值
  const all = [
    ["消耗",      "消耗",       m["消耗"],     "万", 1],
    ["增长量",    "增长量",     m["增长量"],   "万", 1],
    ["ctr",       "CTR",        m.ctr,         "%",  2],
    ["cvr",       "CVR",        m.cvr,         "%",  2],
    ["完播3s",    "3s完播",     m["完播3s"],   "%",  1],
    ["播放时长",  "播放时长",   m["播放时长"], "s",  1],
  ];
  return all.map(([key,lab,v,suf,nd]) => {
    let txt;
    if(state.hiddenMetricValues.has(key)){
      txt = `<span style="color:#94a3b8" title="对外版隐藏数值，仅作排序维度">—</span>`;
    } else if(v == null){
      txt = "—";
    } else {
      txt = v.toFixed(nd) + suf;
    }
    return `<div class="metric"><div class="lab">${lab}</div><div class="val">${txt}</div></div>`;
  }).join("");
}

function applyFilter(list){
  const f = state.filters;
  return list.filter(d=>{
    if(f.industries.size && !f.industries.has(d["KPI三级行业"])) return false;
    if(f.products.size && !f.products.has(d["商品类型"])) return false;
    if(f.customers.size && !f.customers.has(d["客户简称"])) return false;
    if(f.brands.size && !f.brands.has(d["品牌or非品牌"])) return false;
    if(f.matTypes.size && !f.matTypes.has(_itemMatTypeL1(d))) return false;
    if(f.matSubTypes && f.matSubTypes.size && !f.matSubTypes.has(_itemMatTypeL2(d))) return false;
    if(f.baidaTags.size && !f.baidaTags.has(d["白达or非白达"]||"")) return false;
    if(f.tuopinCats && f.tuopinCats.size){
      const tc = d["拓品品类分类"] || "";
      if(!tc || !f.tuopinCats.has(tc)) return false;
    }
    if(f.tuopinNames && f.tuopinNames.size){
      const tn = d["拓品品类名称"] || "";
      if(!tn || !f.tuopinNames.has(tn)) return false;
    }
    if(f.metricTags.size){
      let hit=false; for(const t of f.metricTags){ if(_metricTagMatches(d.metric_tags, t)){ hit=true; break; } }
      if(!hit) return false;
    }
    if(f.onlyFailed && !isItemFailed(d)) return false;
    return true;
  });
}
function applySort(list){
  const k = state.sortBy, dir = state.sortDir==="asc"?1:-1;
  return [...list].sort((a,b)=>{
    const va = a.metrics[k], vb = b.metrics[k];
    if(va==null && vb==null) return 0;
    if(va==null) return 1;
    if(vb==null) return -1;
    return (va-vb)*dir;
  });
}
function applyTopN(list){
  if(!state.topN || state.topN<=0) return list;
  return list.slice(0, state.topN);
}

// analysis 字段值 → 可显示字符串（兼容对象/数组/字符串）
function _stringifyAnaValue(v){
  if(v == null) return "";
  if(typeof v === "string") return v;
  if(typeof v === "number" || typeof v === "boolean") return String(v);
  if(Array.isArray(v)) return v.map(x => _stringifyAnaValue(x)).filter(Boolean).join(" / ");
  if(typeof v === "object"){
    // 兼容 {一级,二级} / {一级类目,二级类目} / {l1,l2} 等近似形态：
    //   不再直接 JSON.stringify（避免对外版出现 {"一级":"...","二级":"..."} 大括号）
    const L1_KEYS = ["一级","一级类目","l1","level1","first","primary"];
    const L2_KEYS = ["二级","二级类目","l2","level2","second","secondary"];
    const pickKey = (keys) => keys.find(k => v[k] != null && String(v[k]).trim() !== "");
    const k1 = pickKey(L1_KEYS), k2 = pickKey(L2_KEYS);
    if(k1 || k2){
      const a = k1 ? String(v[k1]).trim() : "";
      const b = k2 ? String(v[k2]).trim() : "";
      if(a && b) return `${a} · ${b}`;
      return a || b || "";
    }
    // 退化方案：把对象的所有字符串/数字 value 用 ' · ' 拼起来；不再走 JSON.stringify
    const parts = [];
    for(const k of Object.keys(v)){
      const x = v[k];
      if(x == null) continue;
      if(typeof x === "string" && x.trim()) parts.push(x.trim());
      else if(typeof x === "number" || typeof x === "boolean") parts.push(String(x));
      else if(Array.isArray(x)){
        const t = x.filter(z => typeof z === "string" && z.trim()).join(" / ");
        if(t) parts.push(t);
      }
    }
    return parts.join(" · ");
  }
  return String(v);
}

// 渲染卡片底部的素材结构关键帧条带（横向滚动）
function renderStruct(d){
  const a = d.analysis || {};
  const stages = a["素材结构"];
  const frames = (state.keyframes||{})[d.md5] || [];
  if(!Array.isArray(stages) || !stages.length) return "";
  // 把 stages 按 idx 映射到 frames（idx 对齐，没有图就显示占位）
  const frameByIdx = {};
  frames.forEach(f => frameByIdx[f.idx] = f);
  const items = stages.map((s,i)=>{
    const idx = (typeof s.idx === "number") ? s.idx : i;
    const f = frameByIdx[idx];
    const name = s.name || ('环节'+(i+1));
    const time = s.time || (s.at_sec!=null ? (s.at_sec.toFixed(1)+'s') : '');
    if(f && f.data_uri){
      return `<div class="frame">
        <img src="${f.data_uri}" alt="${escapeHTML(name)}">
        <div class="fc"><div class="fn">${escapeHTML(name)}</div><div class="ft">${escapeHTML(time)}</div></div>
      </div>`;
    }
    return `<div class="frame no-img">
      <div class="ph">无关键帧</div>
      <div class="fc"><div class="fn">${escapeHTML(name)}</div><div class="ft">${escapeHTML(time)}</div></div>
    </div>`;
  }).join("");
  const nWithImg = items ? frames.filter(f=>f.data_uri).length : 0;
  return `<div class="struct">
    <div class="struct-h">📋 素材结构 <span class="cnt">· ${stages.length} 个环节${nWithImg?` · ${nWithImg} 张关键帧`:''}</span></div>
    <div class="frames">${items}</div>
  </div>`;
}

// —— 多选下拉（带搜索 + 可选的"动态可见过滤"用于联动）——
// 返回控制句柄：{ refresh(opts) } —— opts.allowedValues=Set 时只显示这些 chip；其余按搜索词过滤
function buildMultiSelect(id, label, values, key, opts){
  opts = opts || {};
  const wrap = document.getElementById(id);
  const btn = wrap.querySelector(".ms-dd-btn");
  const panel = wrap.querySelector(".ms-dd-panel");
  const showSearch = (opts.search !== false) && values.length >= 6; // 选项 ≥6 才显示搜索框
  const placeholder = opts.placeholder || `搜索 ${label}…`;
  panel.innerHTML = `
    ${showSearch ? `<input type="text" class="ms-search" placeholder="${escapeHTML(placeholder)}" />` : ""}
    <div class="ms-empty" hidden>无匹配项</div>
    <div class="ms-chips">${values.map(v=>`<span class="chip" data-v="${escapeHTML(v)}">${escapeHTML(v)}</span>`).join("")}</div>
  `;
  const chipsBox = panel.querySelector(".ms-chips");
  const emptyBox = panel.querySelector(".ms-empty");
  const searchEl = panel.querySelector(".ms-search");
  let allowedSet = null; // 联动用：null=不限制；Set=只显示集合内的值

  function applyVisible(){
    const q = (searchEl && searchEl.value || "").trim().toLowerCase();
    let nVisible = 0;
    chipsBox.querySelectorAll(".chip").forEach(c => {
      const v = c.dataset.v || "";
      const passLink = !allowedSet || allowedSet.has(v);
      const passQ = !q || v.toLowerCase().indexOf(q) !== -1;
      const ok = passLink && passQ;
      c.style.display = ok ? "" : "none";
      if(ok) nVisible++;
    });
    if(emptyBox) emptyBox.hidden = nVisible > 0;
  }

  chipsBox.querySelectorAll(".chip").forEach(c=>{
    c.onclick = () => {
      const v = c.dataset.v;
      const set = state.filters[key];
      if(set.has(v)){ set.delete(v); c.classList.remove("on"); }
      else{ set.add(v); c.classList.add("on"); }
      const n = set.size;
      btn.textContent = n ? `${label}（${n}）` : `${label}（全部）`;
      render();
    };
  });

  if(searchEl){
    searchEl.addEventListener("input", applyVisible);
    searchEl.addEventListener("click", e => e.stopPropagation()); // 别冒泡触发外层 close
  }

  btn.onclick = (e) => {
    e.stopPropagation();
    const willOpen = !wrap.classList.contains("open");
    document.querySelectorAll(".ms-dd").forEach(d=>{ if(d!==wrap) d.classList.remove("open"); });
    wrap.classList.toggle("open", willOpen);
    if(willOpen && searchEl){ searchEl.value = ""; applyVisible(); setTimeout(()=>searchEl.focus(), 30); }
  };

  applyVisible();

  // 暴露控制句柄：外部可调用刷新（联动用）
  return {
    setAllowed(set){ allowedSet = set || null; applyVisible(); },
    clearSelection(){
      const s = state.filters[key]; if(!s) return;
      s.clear();
      chipsBox.querySelectorAll(".chip.on").forEach(c => c.classList.remove("on"));
      btn.textContent = `${label}（全部）`;
    },
  };
}
document.body.addEventListener("click", () => {
  document.querySelectorAll(".ms-dd").forEach(d=>d.classList.remove("open"));
});

function buildFilters(){
  const data = state.data;
  const industries = [...new Set(data.map(d=>d["KPI三级行业"]).filter(Boolean))].sort();
  const products = [...new Set(data.map(d=>d["商品类型"]).filter(Boolean))].sort();
  const customers = [...new Set(data.map(d=>d["客户简称"]).filter(Boolean))].sort();
  const brands = [...new Set(data.map(d=>d["品牌or非品牌"]).filter(Boolean))].sort();
  const matTypes = [...new Set(data.map(d => _itemMatTypeL1(d)).filter(Boolean))].sort();
  const matSubTypes = [...new Set(data.map(d => _itemMatTypeL2(d)).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'zh'));
  const baidaTags = [...new Set(data.map(d => d["白达or非白达"]).filter(Boolean))].sort();
  const tuopinCats = [...new Set(data.map(d => d["拓品品类分类"]).filter(Boolean))].sort();
  const tuopinNames = [...new Set(data.map(d => d["拓品品类名称"]).filter(Boolean))].sort();

  buildMultiSelect("ddIndustry", "行业", industries, "industries");
  buildMultiSelect("ddProduct", "商品类型", products, "products");
  buildMultiSelect("ddCustomer", "客户", customers, "customers");
  buildMultiSelect("ddBrand", "品牌", brands, "brands");
  // 一级开篇类型：选完后联动二级；包装一层让选择回调能 trigger 二级刷新
  const matTypeCtl = buildMultiSelect("ddMatType", "开篇类型", matTypes, "matTypes");
  // 二级风格：自由文本，往往 80+ 个值，必开搜索
  const matSubCtl = buildMultiSelect("ddMatSub", "二级风格", matSubTypes, "matSubTypes",
    {placeholder: "搜索二级风格（如『明星』『口播』）…"});
  buildMultiSelect("ddBaida", "白达or非白达", baidaTags, "baidaTags");
  buildMultiSelect("ddTuopin", "爆品分类", tuopinCats, "tuopinCats");
  buildMultiSelect("ddTuopinName", "爆品名称", tuopinNames, "tuopinNames");

  // —— 二级联动一级 ——
  // 选了一级时，二级面板只显示这些一级下出现过的二级值；同时清掉已选二级里"不属于这个一级"的，避免脏选择
  function _allowedL2ByL1(){
    const sel = state.filters.matTypes;
    if(!sel || !sel.size) return null; // 不限制
    const allowed = new Set();
    data.forEach(d => {
      const l1 = _itemMatTypeL1(d);
      const l2 = _itemMatTypeL2(d);
      if(l1 && l2 && sel.has(l1)) allowed.add(l2);
    });
    return allowed;
  }
  function syncMatSubLink(){
    const allowed = _allowedL2ByL1();
    matSubCtl.setAllowed(allowed);
    // 收敛：已选二级里不在 allowed 内的，自动取消
    if(allowed){
      const cur = state.filters.matSubTypes;
      let changed = false;
      [...cur].forEach(v => {
        if(!allowed.has(v)){ cur.delete(v); changed = true; }
      });
      if(changed){
        // 同步面板上的 .on 标记和按钮文案
        const panel = document.querySelector("#ddMatSub .ms-chips");
        if(panel) panel.querySelectorAll(".chip.on").forEach(c => {
          if(!cur.has(c.dataset.v)) c.classList.remove("on");
        });
        const btn = document.querySelector("#ddMatSub .ms-dd-btn");
        if(btn) btn.textContent = cur.size ? `二级风格（${cur.size}）` : `二级风格（全部）`;
      }
    }
  }
  // hook：监听一级 chip 点击 → 联动二级
  document.querySelectorAll("#ddMatType .ms-chips .chip").forEach(c => {
    const orig = c.onclick;
    c.onclick = (e) => { if(orig) orig(e); syncMatSubLink(); };
  });
  // 初始化一次
  syncMatSubLink();

  // 对外版：客户简称已物理抹除，整组『👥 客户』筛选直接隐藏，避免出现空下拉
  if(!customers.length){
    const ddc = document.getElementById("ddCustomer");
    const grp = ddc ? ddc.closest(".group") : null;
    if(grp) grp.style.display = "none";
  }

  // 指标标签 chips
  const chips = document.getElementById("fMetricTags");
  const usedTags = new Set();
  // 收集所有 tag，并把老的 高ctr / 高cvr 折叠成 高ctcvr（兼容老 board）
  data.forEach(d => _displayMetricTags(d.metric_tags).forEach(t => usedTags.add(t)));
  const order = METRIC_TAG_LIST.filter(t => usedTags.has(t));
  // 外部版隐藏跟金额相关的 tag（高消耗 / 高增长）；内部版保留
  const visible = state.internal ? order : order.filter(t => t !== "高消耗" && t !== "高增长");
  chips.innerHTML = visible.map(t => `<span class="chip" data-tag="${escapeHTML(t)}">${escapeHTML(t)}</span>`).join("");
  chips.querySelectorAll(".chip").forEach(c=>{
    c.onclick = () => {
      const t = c.dataset.tag;
      const set = state.filters.metricTags;
      if(set.has(t)){ set.delete(t); c.classList.remove("on"); }
      else{ set.add(t); c.classList.add("on"); }
      render();
    };
  });

  // 仅显示失败
  const cf = document.getElementById("chipOnlyFailed");
  cf.onclick = () => {
    state.filters.onlyFailed = !state.filters.onlyFailed;
    cf.classList.toggle("on", state.filters.onlyFailed);
    render();
  };

  document.getElementById("sortBy").onchange = e => { state.sortBy = e.target.value; render(); };
  document.getElementById("sortDir").onchange = e => { state.sortDir = e.target.value; render(); };
  document.getElementById("topN").onchange = e => { state.topN = parseInt(e.target.value,10)||0; render(); };

  document.getElementById("btnClearFilters").onclick = () => {
    state.filters.industries.clear();
    state.filters.products.clear();
    state.filters.customers.clear();
    state.filters.brands.clear();
    state.filters.matTypes.clear();
    state.filters.matSubTypes.clear();
    state.filters.baidaTags.clear();
    if(state.filters.tuopinCats) state.filters.tuopinCats.clear();
    if(state.filters.tuopinNames) state.filters.tuopinNames.clear();
    state.filters.metricTags.clear();
    state.filters.onlyFailed = false;
    document.querySelectorAll(".chip.on").forEach(c => c.classList.remove("on"));
    document.querySelectorAll(".ms-dd-btn").forEach(b => {
      const t = b.textContent || "";
      const m = t.match(/^(.+?)（/);
      if(m) b.textContent = `${m[1]}（全部）`;
    });
    // 二级联动：清空一级后，二级"允许集合"恢复到无限制
    if(matSubCtl && matSubCtl.setAllowed) matSubCtl.setAllowed(null);
    render();
  };
}

// —— v2 多切片特征提炼（5 维度固定卡）——
// 数据结构：PAYLOAD.common_features_v2 = { global, by_open_type{}, by_tuopin_name{} }
// 显示规则（Q5 严格版）：
//   1. 不勾任何筛选 → 显示 global（全量素材）
//   2. 仅勾「开篇类型」一项中的某一个值，且该切片有预跑结果 → 显示该切片
//   3. 仅勾「爆品名称」一项中的某一个值，且该切片有预跑结果 → 显示该切片
//   4. 其他所有情况（多个值、跨维度、勾了非预跑维度如行业/客户/品牌/白达/指标tag/onlyFailed/商品类型/爆品分类）→ 整个区域隐藏
function refreshFeaturesV2(){
  const v2 = PAYLOAD.common_features_v2;
  const sec = document.getElementById("commonSection");
  if(!sec) return;
  if(!v2 || !v2.global || !(v2.global.features||[]).length){
    sec.hidden = true;
    return;
  }
  const f = state.filters || {};
  const titleEl   = document.getElementById("commonTitle");
  const subEl     = document.getElementById("commonSub");
  const gridEl    = document.getElementById("commonGrid");
  const emptyEl   = document.getElementById("commonEmpty");

  // —— 决定要展示哪个切片 ——
  // 把所有筛选器视为可能"激活"的来源：
  //   预跑维度：matTypes（开篇类型一级）、tuopinNames（爆品名称 = csv 拓品品类名称）
  //   非预跑维度：industries / customers / brands / baidaTags / metricTags / onlyFailed
  //                / matSubTypes / products（商品类型，已经不再做切片）/ tuopinCats（爆品分类）
  const matN     = f.matTypes ? f.matTypes.size : 0;
  const subN     = f.matSubTypes ? f.matSubTypes.size : 0;
  const tnN      = f.tuopinNames ? f.tuopinNames.size : 0;     // 爆品名称（预跑维度）
  const tcN      = f.tuopinCats ? f.tuopinCats.size : 0;       // 爆品分类（非预跑）
  const prodN    = f.products ? f.products.size : 0;           // 商品类型（非预跑）
  const indN     = f.industries ? f.industries.size : 0;
  const cusN     = f.customers ? f.customers.size : 0;
  const brdN     = f.brands ? f.brands.size : 0;
  const bdN      = f.baidaTags ? f.baidaTags.size : 0;
  const mtagN    = f.metricTags ? f.metricTags.size : 0;
  const failedOn = !!f.onlyFailed;

  const totalActive = matN + subN + tnN + tcN + prodN + indN + cusN + brdN + bdN + mtagN + (failedOn ? 1 : 0);
  const otherActive = subN + tcN + prodN + indN + cusN + brdN + bdN + mtagN + (failedOn ? 1 : 0);

  let chosen = null;
  let titleText = "";
  let subText = "";

  if(totalActive === 0){
    // —— 默认态：全量提炼 ——
    chosen = v2.global;
    titleText = "🔥 全量素材的特征提炼";
    subText = `基于全部 ${chosen.n||state.data.length} 条素材 · 5 维度共性归因`;
  } else if(otherActive === 0 && matN === 1 && tnN === 0){
    // —— 单维度：开篇类型 ——
    const k = [...f.matTypes][0];
    const slice = (v2.by_open_type||{})[k];
    if(slice){
      chosen = slice;
      titleText = `🎬 开篇类型 · ${k} 的特征提炼`;
      subText = `仅基于「开篇类型 = ${k}」的 ${slice.n} 条素材 · 5 维度共性归因`;
    }
  } else if(otherActive === 0 && tnN === 1 && matN === 0){
    // —— 单维度：爆品名称 ——
    const k = [...f.tuopinNames][0];
    // 优先读新字段 by_tuopin_name，回退老字段 by_product_type 别名
    const slice = (v2.by_tuopin_name||v2.by_product_type||{})[k];
    if(slice){
      chosen = slice;
      titleText = `🛒 爆品名称 · ${k} 的特征提炼`;
      subText = `仅基于「爆品名称 = ${k}」的 ${slice.n} 条素材 · 5 维度共性归因`;
    }
  }

  if(!chosen){
    // 多维度交叉、或单维度但没预跑结果 → 隐藏卡片，显示提示
    sec.hidden = false;
    if(titleEl) titleEl.textContent = "🔥 特征提炼";
    if(subEl)   subEl.textContent = "";
    if(gridEl)  { gridEl.innerHTML = ""; gridEl.style.display = "none"; }
    if(emptyEl) emptyEl.hidden = false;
    return;
  }

  // 命中切片：渲染 5 张维度卡
  sec.hidden = false;
  if(titleEl) titleEl.textContent = titleText;
  if(subEl)   subEl.textContent = subText;
  if(emptyEl) emptyEl.hidden = true;
  if(gridEl)  gridEl.style.display = "";
  _renderCfGrid(chosen.features || [], chosen.md5s || []);
}

// —— md5 → cover dataURI 索引（首次调用时构建，state.data 不变就一直复用）——
//    优先取 state.data（topN 内的素材，封面已内联）；
//    取不到再回落 PAYLOAD.v2_covers（v2 引用的 topN 之外素材的封面，导出时单独补的）
let _md5CoverIndex = null;
function _md5ToCover(md5){
  if(!_md5CoverIndex){
    _md5CoverIndex = {};
    (state.data||[]).forEach(it => {
      if(it && it.md5 && it.cover) _md5CoverIndex[it.md5] = it.cover;
    });
    const extra = PAYLOAD.v2_covers || {};
    Object.keys(extra).forEach(k => {
      if(!_md5CoverIndex[k]) _md5CoverIndex[k] = extra[k];
    });
  }
  return _md5CoverIndex[md5] || "";
}

// 从 desc 文字里抠出所有 #N 引用号，去重保序，返回 1-based 数组
function _extractRefs(desc){
  const re = /#(\d+)/g;
  const seen = new Set();
  const out = [];
  let m;
  while((m = re.exec(desc)) !== null){
    const n = parseInt(m[1], 10);
    if(n >= 1 && !seen.has(n)){ seen.add(n); out.push(n); }
  }
  return out;
}

// 给一张维度卡渲染"被引用素材"的小封面行
function _renderEvidenceRow(desc, sliceMd5s){
  const refs = _extractRefs(desc || "");
  if(!refs.length || !sliceMd5s || !sliceMd5s.length) return "";
  const MAX = 6;
  const valid = refs.filter(n => n <= sliceMd5s.length);
  if(!valid.length) return "";
  const shown = valid.slice(0, MAX);
  const rest  = valid.length - shown.length;
  const items = shown.map(n => {
    const md5 = sliceMd5s[n-1] || "";
    if(!md5) return "";
    const cover = _md5ToCover(md5);
    const titleAttr = `点击定位到 #${n} (${md5.slice(0,8)})`;
    if(cover){
      return `<div class="cf-thumb" data-jump-md5="${escapeHTML(md5)}" title="${titleAttr}">
        <img src="${cover}" alt="">
        <span class="cf-thumb-no">#${n}</span>
      </div>`;
    }
    return `<div class="cf-thumb no-img" data-jump-md5="${escapeHTML(md5)}" title="${titleAttr}">
      #${n}
    </div>`;
  }).join("");
  const more = rest > 0 ? `<span class="cf-thumb-more">+${rest}</span>` : "";
  return `<div class="cf-evid">
    <span class="cf-evid-lab">📎 引用素材</span>
    ${items}${more}
  </div>`;
}

// —— 把"特征提炼"卡片区刷新成新的 features 数组 ——
function _renderCfGrid(features, sliceMd5s){
  const grid = document.getElementById("commonGrid");
  if(!grid) return;
  grid.innerHTML = features.map((f,i) => {
    const desc = f.desc || f.description || '';
    const evid = _renderEvidenceRow(desc, sliceMd5s || []);
    return `
    <div class="cf-card">
      <div class="cf-no">${String(i+1).padStart(2,'0')}</div>
      <div class="cf-title">${escapeHTML(f.title||'')}</div>
      <div class="cf-desc">${escapeHTML(desc)}</div>
      ${evid}
    </div>`;
  }).join("");
}

// —— 全局点击委托：v2 维度卡的小封面 + 主卡左侧大封面，都能跳转到对应素材 ——
document.addEventListener("click", (e) => {
  const el = e.target.closest("[data-jump-md5]");
  if(!el) return;
  const md5 = el.getAttribute("data-jump-md5") || "";
  if(!md5) return;
  // 先看目标素材是否存在于当前导出的素材集合（topN 之外的不在 state.data）
  const inData = (state.data||[]).some(it => it && it.md5 === md5);
  if(!inData){
    e.preventDefault();
    e.stopPropagation();
    _pubToast("该素材在 Top 列表之外，本次报告未收录其完整卡片", "info");
    return;
  }
  const target = document.getElementById("card-" + md5);
  if(!target){
    // 素材在 state.data 但当前被筛选条件隐藏 → 清空筛选再跳
    e.preventDefault();
    e.stopPropagation();
    _pubToast("目标素材当前被筛选条件隐藏，已自动清空筛选后再跳转", "info");
    const btnClear = document.getElementById("btnClearFilters");
    if(btnClear) btnClear.click();
    setTimeout(() => {
      const t2 = document.getElementById("card-" + md5);
      if(t2){
        t2.scrollIntoView({behavior:"smooth", block:"start"});
        t2.classList.remove("flash"); void t2.offsetWidth; t2.classList.add("flash");
      }
    }, 200);
    return;
  }
  e.preventDefault();
  e.stopPropagation();
  target.scrollIntoView({behavior:"smooth", block:"start"});
  target.classList.remove("flash");
  void target.offsetWidth;
  target.classList.add("flash");
}, false);

// —— v2 特征提炼区不再支持前端实时刷新，所有切片均由 republish stage-0 预跑器生成 ——
// （对外报告完全静态化：客户端不发任何 fetch 请求，避免登录态/超时/隐私串联问题）

// 初始化
buildFilters();
refreshFeaturesV2();

// —— 回顶按钮：滚动 600px 后淡入，点击平滑回顶 ——
(function bindBackToTop(){
  const btn = document.getElementById("backToTop");
  if(!btn) return;
  const SHOW_AT = 600;
  let ticking = false;
  function update(){
    const y = window.scrollY || window.pageYOffset || 0;
    btn.classList.toggle("show", y > SHOW_AT);
    ticking = false;
  }
  window.addEventListener("scroll", () => {
    if(!ticking){ requestAnimationFrame(update); ticking = true; }
  }, {passive:true});
  btn.addEventListener("click", () => {
    window.scrollTo({top:0, behavior:"smooth"});
  });
  update();
})();

// —— 全局事件代理：黄金 3s Prompt 的「📋 复制」按钮 ——
//   注意：因为卡片是动态渲染的，直接绑 click 会丢；所以走 document 事件委托。
function _pubToast(msg, kind){
  let el = document.getElementById("_pubToast");
  if(!el){
    el = document.createElement("div");
    el.id = "_pubToast";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.className = kind || "ok";
  el.style.display = "block";
  clearTimeout(_pubToast._t);
  _pubToast._t = setTimeout(()=>{ el.style.display = "none"; }, 1800);
}
document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-hook-copy]");
  if(!btn) return;
  e.preventDefault();
  e.stopPropagation();
  const txt = btn.getAttribute("data-hook-copy") || "";
  // 解码 escapeHTML（&amp; &lt; &gt; &quot; &#39;）
  const decoded = (() => {
    const ta = document.createElement("textarea");
    ta.innerHTML = txt;
    return ta.value;
  })();
  const finish = (ok) => {
    if(ok){
      btn.classList.add("copied");
      const orig = btn.textContent;
      btn.textContent = "✓ 已复制";
      setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = orig; }, 1500);
      _pubToast("已复制黄金 3s prompt，可粘贴到妙思 admuse", "ok");
    } else {
      _pubToast("复制失败，请手动选中", "err");
    }
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(decoded).then(()=>finish(true), ()=>finish(false));
  } else {
    // 兜底：临时 textarea + execCommand
    const ta = document.createElement("textarea");
    ta.value = decoded;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch(_){}
    document.body.removeChild(ta);
    finish(ok);
  }
}, false);

// MD5 标签：点击复制完整 MD5 到剪贴板
document.addEventListener("click", (e) => {
  const tag = e.target.closest(".md5-tag[data-md5]");
  if(!tag) return;
  e.preventDefault();
  e.stopPropagation();
  const md5 = tag.getAttribute("data-md5") || "";

    if(ok){
      tag.classList.add("copied");
      const orig = tag.textContent;
      tag.textContent = "✓ 已复制";
      setTimeout(()=>{ tag.classList.remove("copied"); tag.textContent = orig; }, 1500);
      _pubToast("已复制素材 MD5：" + md5, "ok");
    } else {
      _pubToast("复制失败，请手动选中", "err");
    }
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(md5).then(()=>finish(true), ()=>finish(false));
  } else {
    const ta = document.createElement("textarea");
    ta.value = md5;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch(_){}
    document.body.removeChild(ta);
    finish(ok);
  }
}, false);
